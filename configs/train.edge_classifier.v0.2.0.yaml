project: model-port
vendor: vendor-demo
base_model: torchvision/mobilenet-v3-small

dataset:
  name: synthetic-scene-classification
  split: train
  local_jsonl: data/scene_classification.jsonl
  root_dir: data
  max_samples: 200
  train_ratio: 0.9
  image_size: 224
  classes:
    - indoor
    - outdoor
    - desk
    - road
    - person

training:
  method: supervised-classification
  model_name: edge-scene-classifier
  version: 0.2.0
  output_dir: artifacts/models/edge-scene-classifier-v0.2.0
  num_train_epochs: 4
  per_device_train_batch_size: 16
  learning_rate: 0.001

inference:
  batch_size: 1
  image_size: 224

wandb:
  project: model-port
  job_type: train-classifier
  tags: [mobilenetv3, classifier, edge-target, v0.2.0]

validation:
  active_profile: edge_target
  quality_gates:
    cloud_sim:
      min_accuracy: 0.8
      max_p95_latency_ms: 3000
      max_failure_rate: 0.01
      max_drift_score: 0.2
      max_model_size_mb: 100
    edge_target:
      min_accuracy: 0.8
      max_p95_latency_ms: 100
      max_failure_rate: 0.01
      max_drift_score: 0.2
      max_model_size_mb: 100
