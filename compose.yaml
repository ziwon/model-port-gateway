services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
    command: uvicorn model_port.api.main:app --reload --host 0.0.0.0 --port 8080
    environment:
      MODEL_PORT_ENV: local
      MODEL_PORT_REGISTRY_BACKEND: ${MODEL_PORT_REGISTRY_BACKEND:-json}
      MODEL_PORT_REGISTRY_PATH: ${MODEL_PORT_REGISTRY_PATH:-}
      WANDB_BASE_URL: http://wandb:8080
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      WANDB_ENTITY: ${WANDB_ENTITY:-}
      WANDB_ARTIFACT_TYPE: ${WANDB_ARTIFACT_TYPE:-model}
      WANDB_PROJECT: model-port
    ports:
      - "127.0.0.1:${MODEL_PORT_API_PORT:-18080}:8080"
    volumes:
      - .:/app
      - model-artifacts:/app/artifacts
    depends_on:
      wandb:
        condition: service_started

  trainer:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: trainer
    command: sleep infinity
    environment:
      MODEL_PORT_ENV: local
      MODEL_PORT_REGISTRY_BACKEND: ${MODEL_PORT_REGISTRY_BACKEND:-json}
      MODEL_PORT_REGISTRY_PATH: ${MODEL_PORT_REGISTRY_PATH:-}
      WANDB_BASE_URL: http://wandb:8080
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      WANDB_ENTITY: ${WANDB_ENTITY:-}
      WANDB_ARTIFACT_TYPE: ${WANDB_ARTIFACT_TYPE:-model}
      WANDB_PROJECT: model-port
      # Default to offline so training runs without a server account; set
      # WANDB_MODE=online in .env once a valid 40+ char local key is in place.
      WANDB_MODE: ${WANDB_MODE:-offline}
      HF_HOME: /cache/huggingface
    volumes:
      - .:/app
      - hf-cache:/cache/huggingface
      - model-artifacts:/app/artifacts
    depends_on:
      wandb:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  trainer-cuda:
    profiles: ["cuda"]
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: trainer-cuda
    command: sleep infinity
    environment:
      MODEL_PORT_ENV: local
      MODEL_PORT_REGISTRY_BACKEND: ${MODEL_PORT_REGISTRY_BACKEND:-json}
      MODEL_PORT_REGISTRY_PATH: ${MODEL_PORT_REGISTRY_PATH:-}
      WANDB_BASE_URL: http://wandb:8080
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      WANDB_ENTITY: ${WANDB_ENTITY:-}
      WANDB_ARTIFACT_TYPE: ${WANDB_ARTIFACT_TYPE:-model}
      WANDB_PROJECT: model-port
      WANDB_MODE: ${WANDB_MODE:-offline}
      HF_HOME: /cache/huggingface
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - .:/app
      - hf-cache:/cache/huggingface
      - model-artifacts:/app/artifacts
    depends_on:
      wandb:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  wandb:
    image: wandb/local:latest
    ports:
      - "127.0.0.1:${WANDB_PORT:-8081}:8080"
    volumes:
      - wandb-data:/vol

volumes:
  wandb-data:
  hf-cache:
  model-artifacts:
